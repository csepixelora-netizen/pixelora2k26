services:
  - type: web
    name: pixelora-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ALLOWED_ORIGINS
        value: https://your-github-username.github.io
      - key: FIREBASE_STORAGE_BUCKET
        value: your-project-id.appspot.com
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: ADMIN_PORTAL_SECRET
        sync: false
      - key: ADMIN_SECRET_TECH
        sync: false
      - key: ADMIN_SECRET_NONTECH
        sync: false
      - key: ADMIN_SECRET_FOOD
        sync: false
